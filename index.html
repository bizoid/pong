<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #fff;
    }
    canvas {
      border: 2px solid #fff;
    }
    #info {
      margin-top: 12px;
      font-size: 13px;
      color: #aaa;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #overlay h1 { font-size: 48px; letter-spacing: 8px; }
    #overlay p  { font-size: 16px; color: #aaa; }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>PONG</h1>
    <p>Press <strong>Space</strong> or tap to start</p>
  </div>
  <canvas id="c"></canvas>
  <div id="info">
    W/S &nbsp;— Left paddle &nbsp;|&nbsp; ↑/↓ — Right paddle &nbsp;|&nbsp; Space — pause
  </div>

  <script>
    const canvas  = document.getElementById('c');
    const ctx     = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');

    // ─── Layout ───────────────────────────────────────────────────────────────
    const W = 800, H = 500;
    canvas.width  = W;
    canvas.height = H;

    const PAD_W = 12, PAD_H = 80, PAD_SPEED = 5;
    const BALL_SIZE = 10;
    const WIN_SCORE = 7;

    // ─── State ────────────────────────────────────────────────────────────────
    let state = 'idle'; // idle | playing | paused | over

    let leftScore  = 0;
    let rightScore = 0;

    const left  = { x: 20,         y: H / 2 - PAD_H / 2, dy: 0 };
    const right = { x: W - 20 - PAD_W, y: H / 2 - PAD_H / 2, dy: 0 };

    const ball = { x: 0, y: 0, dx: 0, dy: 0 };

    function resetBall(dir = 1) {
      ball.x  = W / 2;
      ball.y  = H / 2;
      const angle = (Math.random() * 40 - 20) * Math.PI / 180;
      const speed = 5;
      ball.dx = dir * speed * Math.cos(angle);
      ball.dy = speed * Math.sin(angle);
    }

    function reset() {
      leftScore  = 0;
      rightScore = 0;
      left.y  = H / 2 - PAD_H / 2;
      right.y = H / 2 - PAD_H / 2;
      resetBall();
    }

    // ─── Input ────────────────────────────────────────────────────────────────
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.key] = true;

      if (e.key === ' ') {
        e.preventDefault();
        if (state === 'idle' || state === 'over') {
          reset();
          state = 'playing';
          overlay.style.display = 'none';
        } else if (state === 'playing') {
          state = 'paused';
          showOverlay('PAUSED', 'Press Space to resume');
        } else if (state === 'paused') {
          state = 'playing';
          overlay.style.display = 'none';
        }
      }
    });
    window.addEventListener('keyup',  e => { keys[e.key] = false; });

    // tap / click to start
    canvas.addEventListener('click', () => {
      if (state === 'idle' || state === 'over') {
        reset();
        state = 'playing';
        overlay.style.display = 'none';
      }
    });

    function showOverlay(title, sub) {
      overlay.innerHTML = `<h1>${title}</h1><p>${sub}</p>`;
      overlay.style.display = 'flex';
    }

    // ─── Update ───────────────────────────────────────────────────────────────
    function update() {
      if (state !== 'playing') return;

      // Paddle movement
      if (keys['w'] || keys['W']) left.y  -= PAD_SPEED;
      if (keys['s'] || keys['S']) left.y  += PAD_SPEED;
      if (keys['ArrowUp'])        right.y -= PAD_SPEED;
      if (keys['ArrowDown'])      right.y += PAD_SPEED;

      left.y  = Math.max(0, Math.min(H - PAD_H, left.y));
      right.y = Math.max(0, Math.min(H - PAD_H, right.y));

      // Ball movement
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Top / bottom bounce
      if (ball.y <= 0)           { ball.y  = 0;         ball.dy *= -1; }
      if (ball.y + BALL_SIZE >= H){ ball.y = H - BALL_SIZE; ball.dy *= -1; }

      // Paddle collision
      function hitPad(pad) {
        return (
          ball.x < pad.x + PAD_W &&
          ball.x + BALL_SIZE > pad.x &&
          ball.y < pad.y + PAD_H &&
          ball.y + BALL_SIZE > pad.y
        );
      }

      if (hitPad(left) && ball.dx < 0) {
        ball.dx *= -1.05;
        const rel = (ball.y + BALL_SIZE / 2 - (left.y + PAD_H / 2)) / (PAD_H / 2);
        ball.dy = rel * 5;
      }
      if (hitPad(right) && ball.dx > 0) {
        ball.dx *= -1.05;
        const rel = (ball.y + BALL_SIZE / 2 - (right.y + PAD_H / 2)) / (PAD_H / 2);
        ball.dy = rel * 5;
      }

      // Cap speed
      const speed = Math.hypot(ball.dx, ball.dy);
      if (speed > 15) { ball.dx = ball.dx / speed * 15; ball.dy = ball.dy / speed * 15; }

      // Scoring
      if (ball.x + BALL_SIZE < 0) {
        rightScore++;
        checkWin() || resetBall(1);
      }
      if (ball.x > W) {
        leftScore++;
        checkWin() || resetBall(-1);
      }
    }

    function checkWin() {
      if (leftScore >= WIN_SCORE) {
        state = 'over';
        showOverlay('LEFT WINS', 'Press Space or click to play again');
        return true;
      }
      if (rightScore >= WIN_SCORE) {
        state = 'over';
        showOverlay('RIGHT WINS', 'Press Space or click to play again');
        return true;
      }
      return false;
    }

    // ─── Draw ─────────────────────────────────────────────────────────────────
    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);

      // Center dashes
      ctx.setLineDash([10, 10]);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Scores
      ctx.fillStyle = '#fff';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(leftScore,  W / 4,     60);
      ctx.fillText(rightScore, W * 3 / 4, 60);

      // Paddles
      ctx.fillStyle = '#fff';
      ctx.fillRect(left.x,  left.y,  PAD_W, PAD_H);
      ctx.fillRect(right.x, right.y, PAD_W, PAD_H);

      // Ball
      ctx.fillStyle = '#fff';
      ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);
    }

    // ─── Loop ─────────────────────────────────────────────────────────────────
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    resetBall();
    loop();
  </script>
</body>
</html>
